<section class="mc-card mc-card--surface">
  <h3 class="mc-card__title">{{ titulo }}</h3>
  <div class="mc-contact-list">

    <div class="mc-contact-item">
      <span class="material-symbols-outlined mc-contact-item__icon">location_on</span>
      <div>
        <p class="mc-contact-item__label">Dirección</p>
        <p class="mc-contact-item__value">{{ direccion }}</p>
      </div>
    </div>

    <div class="mc-contact-item">
      <span class="material-symbols-outlined mc-contact-item__icon">call</span>
      <div>
        <p class="mc-contact-item__label">Teléfono</p>
        <p class="mc-contact-item__value">{{ telefono }}</p>
      </div>
    </div>

  </div>
</section>
